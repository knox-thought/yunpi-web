name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # The Astro Cloudflare adapter regenerates dist/server/wrangler.json each
      # build with an *unbound* SESSION KV namespace. Pin the existing namespace
      # id so CI deploys are deterministic (no interactive provisioning).
      - name: Pin SESSION KV namespace
        run: |
          node -e "const fs=require('fs');const f='dist/server/wrangler.json';const c=JSON.parse(fs.readFileSync(f));c.kv_namespaces=[{binding:'SESSION',id:'e73a2f2c56df4c95a4b158914e7877d3'}];fs.writeFileSync(f,JSON.stringify(c));console.log('pinned SESSION kv id');"

      - name: Deploy
        run: npx wrangler deploy -c dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
